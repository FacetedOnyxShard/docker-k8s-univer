image: docker:cli

services:
  - docker:dind

stages:
  - build
  - test

build-job:
  stage: build
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - lab2

test-job:
  stage: test
  image: $CI_REGISTRY_IMAGE:latest
  script:
    - ./test.sh
