stages:
  - build
  - deploy

build-job:
  stage: build
  image: docker:cli
  services:
    - docker:dind
  before_script:
    - echo "$HAWK_REGISTRY_PASSWORD" | docker login -u $HAWK_REGISTRY_USER --password-stdin $HAWK_REGISTRY
    - docker context create ci
    - |
      docker buildx create --name multiarch --use ci
      docker buildx inspect --bootstrap
  script:
    - IMAGE_TAG=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    - >
      docker buildx build
      --platform linux/arm64,linux/amd64
      -t $HAWK_REGISTRY_IMAGE:$IMAGE_TAG
      -t $HAWK_REGISTRY_IMAGE:latest
      --push .
    - echo "FULL_IMAGE=${HAWK_REGISTRY_IMAGE}:${IMAGE_TAG}" > build.env
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - if: $CI_COMMIT_BRANCH
      when: manual
  artifacts:
    reports:
      dotenv: build.env

deploy-to-hawk:
  stage: deploy
  image: registry.csc.sibsutis.ru/csc-public/internal-container-images/k8s-tools:latest
  needs: ["build-job"]
  variables:
    NAMESPACE: "ip314"
    MANIFEST_DIR: "./k8s"
  before_script:
    - which kubectl
    - kubectl version --client
    - ls -la $MANIFEST_DIR/
  script:
    - |
      echo "=== Шаг 1: Настройка kubeconfig ==="
      mkdir -p ~/.kube/
      cp "$KUBECONFIG" ~/.kube/config
      chmod 600 ~/.kube/config
      echo "Kubeconfig создан"

    - kubectl -n $NAMESPACE apply -f $MANIFEST_DIR/

    - kubectl get all -n $NAMESPACE | grep s21 || echo "Ресурсы s21 не найдены"
  rules:
    - if: $CI_COMMIT_TAG
      when: manual
    - if: $CI_COMMIT_BRANCH
      when: manual
