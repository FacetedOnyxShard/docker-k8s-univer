apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.name }}-service
  namespace: {{ .Values.namespace }}
  labels:
    owner: ip314s21
    app: {{ .Chart.name }}
spec:
  selector:
    app: {{ .Chart.name }}
  ports:
    - port: 80
      targetPort: {{ .Values.ports.containerPort }}
      protocol: TCP
  type: ClusterIP
