apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    owner: ip314s21
    app: {{ .Release.Name }}-app
spec:
  ingressClassName: traefik-dev
  rules:
    - host: {{ .Release.Name }}-{{ .Values.application.hostSuffix }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-service
                port:
                  number: {{ .Values.application.port }}
